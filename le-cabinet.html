<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Cabinet | Cabinet Jean Bilele Kasongo</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'], serif: ['Playfair Display', 'serif'] },
                    colors: { 'ivory': '#FDFBF7', 'charcoal': '#121212', 'gold': '#C5A059' }
                }
            }
        }
    </script>
</head>
<body class="bg-ivory text-charcoal selection:bg-gold selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Button = ({ children, variant = "primary", onClick, className = "" }) => {
            const base = "inline-flex items-center justify-center px-10 py-5 rounded-full text-[10px] sm:text-xs font-bold tracking-[0.2em] uppercase transition-all duration-500 cursor-pointer shadow-lg active:scale-95";
            const variants = {
                primary: "bg-charcoal text-white hover:bg-gold border border-charcoal hover:border-gold",
                gold: "bg-gold text-white hover:bg-gold-dark border border-gold"
            };
            return <button onClick={onClick} className={`${base} ${variants[variant]} ${className}`}>{children}</button>;
        };

        function App() {
            const [scrolled, setScrolled] = useState(false);
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="min-h-screen">
                    <nav className={`fixed w-full z-50 transition-all duration-700 ${scrolled ? 'bg-white/95 backdrop-blur-xl py-4 shadow-xl' : 'bg-transparent py-8'}`}>
                        <div class="container mx-auto px-6 flex justify-between items-center">
                            <div class="cursor-pointer" onClick={() => window.location.href = 'index.html'}>
                                <div class="font-serif text-2xl tracking-tighter">J<span class="text-gold">.</span>B<span class="text-gold">.</span>K</div>
                            </div>
                            <div class="hidden md:flex items-center space-x-12">
                                <a href="index.html" class="text-[11px] font-bold tracking-[0.2em] uppercase hover:text-gold transition-colors">Accueil</a>
                                <a href="droit-minier.html" class="text-[11px] font-bold tracking-[0.2em] uppercase hover:text-gold transition-colors">Droit Minier</a>
                                <a href="droit-des-affaires.html" class="text-[11px] font-bold tracking-[0.2em] uppercase hover:text-gold transition-colors">Droit des Affaires</a>
                                <Button variant="primary" className="px-6 py-3" onClick={() => window.location.href='index.html#contact'}>Rendez-vous</Button>
                            </div>
                        </div>
                    </nav>

                    {/* Header */}
                    <header class="relative pt-64 pb-20 bg-ivory">
                        <div class="container mx-auto px-6">
                            <span class="text-gold text-[10px] font-bold tracking-[0.5em] uppercase mb-8 block">Institution Juridique</span>
                            <h1 class="font-serif text-6xl md:text-8xl mb-12 italic border-b border-stone-100 pb-12">Le Cabinet.</h1>
                        </div>
                    </header>

                    {/* Mission */}
                    <section class="py-20 lg:py-32">
                        <div class="container mx-auto px-6">
                            <div class="grid lg:grid-cols-2 gap-24">
                                <div class="space-y-12">
                                    <h2 class="font-serif text-3xl md:text-4xl leading-tight">Expertise approfondie des réalités juridiques et économiques de la RDC.</h2>
                                    <p class="text-stone-600 text-lg font-light leading-relaxed">Le Cabinet Maître Jean Bilele Kasongo est le partenaire privilégié des entreprises et investisseurs opérant en République Démocratique du Congo. Nous intervenons sur des dossiers à forte valeur ajoutée, où la précision juridique rencontre l'enjeu économique majeur.</p>
                                    <p class="text-stone-600 text-lg font-light leading-relaxed">Nous nous distinguons par une approche orientée résultats : chaque dossier est traité comme un véritable enjeu stratégique. Notre mission est de transformer la complexité du cadre légal congolais en un levier de croissance pour nos clients.</p>
                                </div>
                                <div class="bg-charcoal text-white p-12 lg:p-20 rounded-[40px] shadow-2xl relative overflow-hidden">
                                    <div class="absolute top-0 right-0 w-64 h-64 bg-gold/10 blur-3xl rounded-full"></div>
                                    <h3 class="font-serif text-2xl text-gold mb-10 italic">Nos Valeurs</h3>
                                    <div class="space-y-10">
                                        {[
                                            { t: "Excellence", d: "Une rigueur absolue dans la rédaction et le conseil." },
                                            { t: "Réactivité", d: "Un accompagnement en temps réel pour vos projets critiques." },
                                            { t: "Indépendance", d: "Un conseil libre et intègre face aux autorités." },
                                            { t: "Confidentialité", d: "La sécurité absolue de vos informations stratégiques." }
                                        ].map((v, i) => (
                                            <div key={i}>
                                                <h4 class="text-xs font-bold uppercase tracking-widest text-gold mb-2">{v.t}</h4>
                                                <p class="text-stone-400 text-sm font-light">{v.d}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Pour qui */}
                    <section class="py-32 bg-stone-50">
                        <div class="container mx-auto px-6">
                            <div class="text-center mb-24">
                                <h2 class="font-serif text-4xl mb-6 italic">Ils nous font confiance.</h2>
                                <p class="text-stone-500 font-light">Nous accompagnons un spectre large d'acteurs de premier plan.</p>
                            </div>
                            <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-8">
                                {[
                                    { t: "Sociétés Minières", d: "Exploitants, comptoirs et sous-traitants." },
                                    { t: "Investisseurs Étrangers", d: "Fonds, banques et holdings internationaux." },
                                    { t: "Groupes Locaux", d: "Entreprises en phase d'expansion OHADA." },
                                    { t: "Institutions", d: "Organisations et agences d'investissement." }
                                ].map((item, i) => (
                                    <div key={i} class="p-10 bg-white border border-stone-100 rounded-3xl hover:border-gold transition-all duration-500">
                                        <h4 class="font-serif text-xl border-stone-100 mb-4">{item.t}</h4>
                                        <p class="text-stone-400 text-sm font-light leading-relaxed">{item.d}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Signature */}
                    <section class="py-32 bg-ivory text-center">
                        <div class="container mx-auto px-6">
                            <p class="font-serif text-2xl lg:text-3xl text-charcoal italic mb-12">"Parce que votre succès en RDC exige la meilleure architecture juridique."</p>
                            <Button variant="primary" onClick={() => window.location.href='index.html#contact'}>Engager une collaboration</Button>
                        </div>
                    </section>

                    <footer class="bg-charcoal py-20 text-stone-500">
                        <div class="container mx-auto px-6 text-center">
                            <div class="font-serif text-2xl tracking-tighter text-stone-300 mb-8">J<span class="text-gold">.</span>B<span class="text-gold">.</span>K</div>
                            <p class="text-[10px] font-bold tracking-[0.3em] uppercase">Cabinet Maître Jean Bilele Kasongo</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
