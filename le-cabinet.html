                // Respecte le réglage OS "réduire les animations"
                if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                    setIsVisible(true);
                    return;
                }

                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setTimeout(() => setIsVisible(true), delay);
                        }
                    },
                    { threshold: 0.1 }
                );

                if (ref.current) observer.observe(ref.current);
                return () => {
                    if (ref.current) observer.unobserve(ref.current);
                };
            }, [delay]);

            return (
                <div ref={ref} className={`transition-all duration-600 transform ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-10'}`}>
                    {children}
                </div>
            );
