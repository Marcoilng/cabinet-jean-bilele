<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Droit Routier | Cabinet d'Avocat Jean Bilele Kasongo | Lubumbashi</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel pour le JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

    <!-- Configuration Tailwind personnalisée -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Lato', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        'ivory': '#FAFAFA',
                        'charcoal': '#0A0A0A',
                        'gold': '#D4AF37',
                        'gold-dark': '#B8962E',
                        'navy': '#001F3F',
                        'primary': '#0F172A',
                        'warm-gray': '#F5F5F5',
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.6s ease-out forwards',
                        'bounce-subtle': 'bounceSubtle 2s infinite',
                        'pulse-slow': 'pulse 10s infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(30px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        bounceSubtle: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-5px)' },
                        },
                    },
                }
            }
        }
    </script>

    <style>
        html { scroll-behavior: smooth; }
        body { background-color: #FDFBF7; color: #333333; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #FDFBF7; }
        ::-webkit-scrollbar-thumb { background: #C5A059; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Icons
        const Scale = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/></svg>
        );
        const Gavel = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m14.5 12.5-8 8a2.119 2.119 0 1 1-3-3l8-8"/><path d="m16 16 6-6"/><path d="m8 8 6-6"/><path d="m9 7 8 8"/><path d="m21 11-8-8"/></svg>
        );
        const Users = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        );
        const FileText = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
        );

        const RevealOnScroll = ({ children, delay = 0 }) => {
            const [isVisible, setIsVisible] = useState(false);
            const ref = useRef(null);
            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) { setIsVisible(true); observer.unobserve(entry.target); }
                }, { threshold: 0.1 });
                if (ref.current) observer.observe(ref.current);
                return () => { if (ref.current) observer.unobserve(ref.current); };
            }, []);
            return (
                <div ref={ref} className={`transition-all duration-1000 transform ${isVisible ? 'opacity-100 translate-y-0 scale-100' : 'opacity-0 translate-y-16 scale-95'}`} style={{ transitionDelay: `${delay}ms` }}>
                    {children}
                </div>
            );
        };

        const SectionTitle = ({ title, subtitle, align = "center" }) => (
            <div className={`mb-16 text-${align}`}>
                <span className="block text-gold text-xs font-bold tracking-[0.2em] uppercase mb-4">{subtitle}</span>
                <h2 className="font-serif text-3xl md:text-4xl text-charcoal leading-tight">{title}</h2>
                <div className={`mt-6 h-[1px] w-16 bg-gold ${align === 'center' ? 'mx-auto' : ''} opacity-60`}></div>
            </div>
        );

        const Button = ({ children, variant = "primary", onClick, className = "" }) => {
            const baseStyle = "inline-flex items-center justify-center px-8 py-4 rounded-full text-xs font-bold tracking-[0.15em] uppercase transition-all duration-500 cursor-pointer hover:scale-105 shadow-md";
            const variants = {
                primary: "bg-charcoal text-white hover:bg-gold border border-charcoal hover:border-gold",
                gold: "bg-gold text-white hover:bg-gold-dark border border-gold"
            };
            return <button onClick={onClick} className={`${baseStyle} ${variants[variant]} ${className}`}>{children}</button>;
        };

        function App() {
            const [scrolled, setScrolled] = useState(false);
            const [menuOpen, setMenuOpen] = useState(false);
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="bg-ivory min-h-screen font-sans text-charcoal selection:bg-gold selection:text-white overflow-x-hidden">
                    <nav className={`fixed w-full z-50 transition-all duration-700 ${scrolled ? 'bg-white/95 backdrop-blur-md py-4 shadow-sm' : 'bg-transparent py-8'}`}>
                        <div className="container mx-auto px-6 flex justify-between items-center">
                            <div className="z-50 cursor-pointer" onClick={() => window.location.href = 'index.html'}>
                                <div className="font-serif text-2xl tracking-tighter text-charcoal">J<span className="text-gold">.</span>B<span className="text-gold">.</span>K</div>
                            </div>
                            <div className="hidden md:flex items-center space-x-10">
                                <button onClick={() => window.location.href = 'index.html#le-cabinet'} className="text-xs font-bold tracking-[0.15em] uppercase hover:text-gold transition-colors">Le Cabinet</button>
                                <button onClick={() => window.location.href = 'index.html#expertise'} className="text-xs font-bold tracking-[0.15em] uppercase hover:text-gold transition-colors">Expertise</button>
                                <button onClick={() => window.location.href = 'index.html#honoraires'} className="text-xs font-bold tracking-[0.15em] uppercase hover:text-gold transition-colors">Honoraires</button>
                                <button onClick={() => window.location.href = 'index.html#contact'} className="text-xs font-bold tracking-[0.15em] uppercase hover:text-gold transition-colors">Contact</button>
                                <Button variant="primary" onClick={() => window.location.href = 'index.html#contact'}>Rendez-vous</Button>
                            </div>
                            <div className="md:hidden z-50">
                                <button onClick={() => setMenuOpen(!menuOpen)} className="text-charcoal focus:outline-none">
                                    <div className="space-y-2">
                                        <span className={`block w-8 h-0.5 bg-current transition-transform ${menuOpen ? 'rotate-45 translate-y-2.5' : ''}`}></span>
                                        <span className={`block w-8 h-0.5 bg-current transition-opacity ${menuOpen ? 'opacity-0' : ''}`}></span>
                                        <span className={`block w-8 h-0.5 bg-current transition-transform ${menuOpen ? '-rotate-45 -translate-y-2.5' : ''}`}></span>
                                    </div>
                                </button>
                            </div>
                        </div>
                        <div className={`fixed inset-0 bg-ivory/95 backdrop-blur-xl flex flex-col justify-center items-center space-y-10 transition-all duration-700 ease-in-out ${menuOpen ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}`}>
                            {[
                                { name: 'Le Cabinet', link: 'le-cabinet.html' },
                                { name: 'Expertise', link: 'index.html#expertise' },
                                { name: 'Honoraires', link: 'index.html#honoraires' },
                                { name: 'Contact', link: 'index.html#contact' }
                            ].map((item, idx) => (
                                <button
                                    key={item.name}
                                    onClick={() => window.location.href = item.link}
                                    className={`font-serif text-4xl text-charcoal transition-all duration-500 transform ${menuOpen ? 'translate-y-0 opacity-100' : 'translate-y-10 opacity-0'}`}
                                    style={{ transitionDelay: `${idx * 100}ms` }}
                                >
                                    {item.name}
                                </button>
                            ))}
                        </div>
                    </nav>

                    <section id="home" className="relative h-screen flex items-center justify-center overflow-hidden">
                        <div className="absolute inset-0 bg-charcoal">
                            <img src="images/medium-shot-lawyer-portrait.jpg" alt="Maître Jean Bilele Kasongo" className="object-cover w-full h-full opacity-30 mix-blend-luminosity scale-110 animate-pulse-slow" />
                            <div className="absolute inset-0 bg-gradient-to-t from-charcoal via-charcoal/40 to-transparent"></div>
                        </div>
                        <div className="container mx-auto px-6 relative z-10 text-center">
                            <RevealOnScroll>
                                <span className="inline-block text-gold text-xs font-bold tracking-[0.3em] uppercase mb-6 bg-white/5 py-2 px-6 rounded-full backdrop-blur-sm border border-gold/20">Défense du Permis</span>
                                <h1 className="font-serif text-5xl md:text-7xl lg:text-8xl text-ivory mb-8 leading-[1.1]">Droit <br/><span className="italic font-light text-gold">Routier</span></h1>
                                <p className="text-stone-400 text-lg md:text-xl max-w-2xl mx-auto mb-12 font-light">Contestation d'infractions, récupération de points et défense pénale pour tous vos litiges routiers à Lubumbashi.</p>
                            </RevealOnScroll>
                        </div>
                        <div className="absolute bottom-10 left-1/2 -translate-x-1/2 z-10 animate-bounce-subtle">
                            <div className="w-[1px] h-12 bg-gradient-to-b from-gold to-transparent"></div>
                        </div>
                    </section>

                    <section className="py-24 md:py-32">
                        <div className="container mx-auto px-6 md:px-12">
                            <div className="grid md:grid-cols-2 gap-16 items-center">
                                <RevealOnScroll>
                                    <div className="relative aspect-[3/4] rounded-3xl bg-stone-200 overflow-hidden shadow-2xl">
                                        <img src="https://images.unsplash.com/photo-1593113630400-ea4288922497?auto=format&fit=crop&q=80&w=1000" alt="Code de la route" className="object-cover w-full h-full grayscale hover:grayscale-0 transition-all duration-1000 opacity-90" />
                                        <div className="absolute inset-0 border border-gold/30 m-4 pointer-events-none rounded-2xl"></div>
                                    </div>
                                </RevealOnScroll>
                                <RevealOnScroll delay={200}>
                                    <span className="block text-gold text-xs font-bold tracking-[0.2em] uppercase mb-6">Présentation</span>
                                    <h2 className="font-serif text-3xl md:text-4xl mb-8">Votre Permis, <br/>votre Liberté.</h2>
                                    <p className="text-stone-600 mb-6 font-light leading-relaxed">Le permis de conduire est souvent indispensable à l'exercice d'une activité professionnelle ou à la vie sociale. Une suspension ou une annulation peut avoir des conséquences dramatiques.</p>
                                    <p className="text-stone-600 mb-10 font-light leading-relaxed">Notre cabinet met son expertise en droit routier à votre service pour contester les infractions, préserver votre capital points et assurer votre défense devant les juridictions compétentes.</p>
                                    <div className="grid grid-cols-1 gap-6 border-t border-stone-200 pt-8">
                                        <div>
                                            <h4 className="font-serif text-lg mb-2">Réactivité Immédiate</h4>
                                            <p className="text-sm text-stone-500">Une analyse de votre dossier sous 24h pour agir dans les délais légaux de contestation.</p>
                                        </div>
                                    </div>
                                </RevealOnScroll>
                            </div>
                        </div>
                    </section>

                    <section className="py-24 bg-[#F5F3EF]">
                        <div className="container mx-auto px-6">
                            <SectionTitle title="Nos Expertises" subtitle="Domaines d'intervention" />
                            <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-8">
                                {[
                                    { title: "Excès de vitesse", icon: <Gavel />, desc: "Contestation technique des relevés de vitesse et vices de procédure." },
                                    { title: "Alcool & Stupéfiants", icon: <Scale />, desc: "Défense pénale rigoureuse en cas de contrôles positifs." },
                                    { title: "Récupération de points", icon: <FileText />, desc: "Stratégies juridiques pour sauvegarder votre permis de conduire." },
                                    { title: "Accidents", icon: <Users />, desc: "Assistance en cas d'accident corporel ou matériel complexe." }
                                ].map((item, idx) => (
                                    <RevealOnScroll key={idx} delay={idx * 100}>
                                        <div className="bg-white p-10 rounded-3xl border border-stone-200 hover:border-gold transition-all shadow-sm hover:shadow-xl group">
                                            <div className="text-gold mb-6 transform group-hover:scale-110 transition-transform">{item.icon}</div>
                                            <h3 className="font-serif text-xl mb-4">{item.title}</h3>
                                            <p className="text-sm text-stone-500 leading-relaxed font-light">{item.desc}</p>
                                        </div>
                                    </RevealOnScroll>
                                ))}
                            </div>
                        </div>
                    </section>

                    <section className="py-24 bg-charcoal text-white text-center">
                        <div className="container mx-auto px-6">
                            <RevealOnScroll>
                                <h2 className="font-serif text-3xl md:text-4xl mb-8">Défendez vos droits routiers.</h2>
                                <p className="text-stone-400 max-w-2xl mx-auto mb-12 font-light">Une question ? Un PV injustifié ? Contactez-nous pour une étude gratuite de votre situation.</p>
                                <Button variant="gold" onClick={() => window.location.href = 'index.html#contact'}>Prendre rendez-vous</Button>
                            </RevealOnScroll>
                        </div>
                    </section>

                    <footer className="bg-[#0a0a0a] text-stone-600 py-16 border-t border-white/5">
                        <div className="container mx-auto px-6 text-center md:text-left">
                            <div className="flex flex-col md:flex-row justify-between items-center mb-12">
                                <div className="font-serif text-2xl tracking-tighter text-stone-300">J<span className="text-gold">.</span>B<span className="text-gold">.</span>K</div>
                                <div className="flex space-x-8 text-xs font-bold tracking-widest uppercase mt-6 md:mt-0">
                                    <a href="index.html" className="hover:text-gold transition-colors">Accueil</a>
                                    <a href="#" className="hover:text-gold transition-colors">Mentions Légales</a>
                                </div>
                            </div>
                            <div className="pt-8 text-xs font-light border-t border-white/5 flex flex-col md:flex-row justify-between items-center">
                                <p className="opacity-50">Lubumbashi, Haut-Katanga, RDC</p>
                                <p className="opacity-50 mt-4 md:mt-0 italic">Conçu par <a href="https://marcoilng.netlify.app" target="_blank" className="text-gold hover:text-white transition-colors">Marco ILUNGA</a></p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
