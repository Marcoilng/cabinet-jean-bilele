<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pôle Droit Minier | Cabinet Jean Bilele Kasongo</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'], serif: ['Playfair Display', 'serif'] },
                    colors: { 'ivory': '#FDFBF7', 'charcoal': '#121212', 'gold': '#C5A059' }
                }
            }
        }
    </script>
</head>
<body class="bg-ivory text-charcoal selection:bg-gold selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Button = ({ children, variant = "primary", onClick, className = "" }) => {
            const base = "inline-flex items-center justify-center px-10 py-5 rounded-full text-[10px] sm:text-xs font-bold tracking-[0.2em] uppercase transition-all duration-500 cursor-pointer shadow-lg active:scale-95";
            const variants = {
                primary: "bg-charcoal text-white hover:bg-gold border border-charcoal hover:border-gold",
                gold: "bg-gold text-white hover:bg-gold-dark border border-gold"
            };
            return <button onClick={onClick} className={`${base} ${variants[variant]} ${className}`}>{children}</button>;
        };

        function App() {
            const [scrolled, setScrolled] = useState(false);
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="min-h-screen">
                    <nav className={`fixed w-full z-50 transition-all duration-700 ${scrolled ? 'bg-white/95 backdrop-blur-xl py-4 shadow-xl' : 'bg-transparent py-8'}`}>
                        <div className="container mx-auto px-6 flex justify-between items-center">
                            <div className="cursor-pointer" onClick={() => window.location.href = 'index.html'}>
                                <div className="font-serif text-2xl tracking-tighter">J<span className="text-gold">.</span>B<span className="text-gold">.</span>K</div>
                            </div>
                            <div className="hidden md:flex items-center space-x-12">
                                <a href="index.html" className="text-[11px] font-bold tracking-[0.2em] uppercase hover:text-gold transition-colors">Accueil</a>
                                <a href="le-cabinet.html" className="text-[11px] font-bold tracking-[0.2em] uppercase hover:text-gold transition-colors">Le Cabinet</a>
                                <a href="droit-des-affaires.html" className="text-[11px] font-bold tracking-[0.2em] uppercase hover:text-gold transition-colors">Droit des Affaires</a>
                                <Button variant="primary" className="px-6 py-3" onClick={() => window.location.href='index.html#contact'}>Contact</Button>
                            </div>
                        </div>
                    </nav>

                    {/* Hero */}
                    <header class="relative pt-64 pb-32 bg-charcoal text-white overflow-hidden">
                        <div class="absolute inset-0 opacity-30">
                            <img src="images/mining-site.png" class="object-cover w-full h-full grayscale" />
                        </div>
                        <div class="container mx-auto px-6 relative z-10">
                            <span class="text-gold text-[10px] font-bold tracking-[0.5em] uppercase mb-8 block">Spécialisation Stratégique</span>
                            <h1 class="font-serif text-5xl md:text-7xl mb-12 max-w-4xl leading-tight">Pôle Droit <span class="italic text-gold">Minier</span></h1>
                            <p class="text-stone-400 text-lg md:text-xl font-light max-w-2xl leading-relaxed italic">"Sécuriser vos opérations et maximiser la rentabilité de vos actifs miniers."</p>
                        </div>
                    </header>

                    {/* Content */}
                    <main class="py-32">
                        <div class="container mx-auto px-6">
                            <div class="grid lg:grid-cols-3 gap-24">
                                <div class="lg:col-span-2 space-y-16">
                                    <section>
                                        <h2 class="font-serif text-3xl mb-10 border-b border-stone-100 pb-6 uppercase tracking-wider text-stone-400 text-xs font-bold">Notre Intervention</h2>
                                        <p class="text-stone-700 text-xl font-light mb-12 leading-relaxed">Nous intervenons à toutes les étapes des projets miniers en République Démocratique du Congo, de la phase d'exploration à la clôture, en passant par l'exploitation et la transformation.</p>
                                        <div class="grid sm:grid-cols-2 gap-8">
                                            {[
                                                { t: "Titres Miniers", d: "Obtention, renouvellement et sécurisation juridique des titres face aux tiers." },
                                                { t: "Assistance Administrative", d: "Représentation auprès des autorités (CAMI, Mines) et conformité réglementaire." },
                                                { t: "Contrats & Négociation", d: "Rédaction et négociation de contrats miniers (JV, cessions, amodiations)." },
                                                { t: "Conformité OHADA & Code Minier", d: "Audit juridique et fiscal pour garantir le respect strict des normes en vigueur." },
                                                { t: "Gestion des Litiges", d: "Résolution des contentieux miniers, arbitrages et défense judiciaire spécialisée." },
                                                { t: "Environnement & Social", d: "Accompagnement sur les obligations RSE et la conformité environnementale." }
                                            ].map((item, i) => (
                                                <div key={i} class="p-8 bg-white border border-stone-100 rounded-2xl hover:shadow-xl transition-all duration-500">
                                                    <h3 class="font-serif text-xl border-gold mb-4 text-gold-dark">{item.t}</h3>
                                                    <p class="text-stone-500 font-light text-sm leading-relaxed">{item.d}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                </div>

                                <aside class="space-y-12">
                                    <div class="bg-charcoal text-white p-12 rounded-3xl sticky top-32">
                                        <h3 class="font-serif text-2xl mb-8">Votre Partenaire</h3>
                                        <p class="text-stone-400 text-sm mb-10 font-light leading-relaxed">Dans un secteur aussi capitalistique et régulé que les mines en RDC, la moindre erreur de procédure peut s'avérer fatale pour vos investissements.</p>
                                        <Button variant="gold" className="w-full" onClick={() => window.location.href='index.html#contact'}>Sécuriser mon projet</Button>
                                    </div>
                                    <div class="p-12 bg-stone-100 rounded-3xl">
                                        <h4 class="text-xs font-bold uppercase tracking-widest text-stone-500 mb-6 font-serif underline">Secteurs Associés</h4>
                                        <ul class="space-y-4 text-sm font-semibold text-stone-600">
                                            <li>• Cuivre & Cobalt</li>
                                            <li>• Or & Diamant</li>
                                            <li>• Ressources Énergétiques</li>
                                            <li>• Infrastructures Minières</li>
                                        </ul>
                                    </div>
                                </aside>
                            </div>
                        </div>
                    </main>

                    <footer class="bg-charcoal py-20 text-stone-500">
                        <div class="container mx-auto px-6 text-center">
                            <div class="font-serif text-2xl tracking-tighter text-stone-300 mb-8">J<span class="text-gold">.</span>B<span class="text-gold">.</span>K</div>
                            <p class="text-[10px] font-bold tracking-[0.3em] uppercase">Cabinet Maître Jean Bilele Kasongo</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
