                gold: "bg-gold text-white hover:bg-gold-dark border border-gold"
            };
            return <button onClick={onClick} className={`${base} ${variants[variant]} ${className}`}>{children}</button>;

        const RevealOnScroll = ({ children, delay = 0 }) => {
            const [isVisible, setIsVisible] = useState(false);
            const ref = React.useRef(null);

            useEffect(() => {
                // Respecte le réglage OS "réduire les animations"
                if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                    setIsVisible(true);
                    return;
                }

                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setTimeout(() => setIsVisible(true), delay);
                        }
                    },
                    { threshold: 0.1 }
                );

                if (ref.current) observer.observe(ref.current);
                return () => {
                    if (ref.current) observer.unobserve(ref.current);
                };
            }, [delay]);

            return (
                <div ref={ref} className={`transition-all duration-600 transform ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-10'}`}>
                    {children}
                </div>
            );
        };
