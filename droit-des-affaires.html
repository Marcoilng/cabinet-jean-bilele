<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pôle Droit des Affaires | Cabinet Jean Bilele Kasongo</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'], serif: ['Playfair Display', 'serif'] },
                    colors: { 'ivory': '#FDFBF7', 'charcoal': '#121212', 'gold': '#C5A059' }
                }
            }
        }
    </script>
</head>
<body class="bg-ivory text-charcoal selection:bg-gold selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Button = ({ children, variant = "primary", onClick, className = "" }) => {
            const base = "inline-flex items-center justify-center px-10 py-5 rounded-full text-[10px] sm:text-xs font-bold tracking-[0.2em] uppercase transition-all duration-500 cursor-pointer shadow-lg active:scale-95";
            const variants = {
                primary: "bg-charcoal text-white hover:bg-gold border border-charcoal hover:border-gold",
                gold: "bg-gold text-white hover:bg-gold-dark border border-gold"
            };
            return <button onClick={onClick} className={`${base} ${variants[variant]} ${className}`}>{children}</button>;
        };

        function App() {
            const [scrolled, setScrolled] = useState(false);
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="min-h-screen">
                    <nav className={`fixed w-full z-50 transition-all duration-700 ${scrolled ? 'bg-white/95 backdrop-blur-xl py-4 shadow-xl' : 'bg-transparent py-8'}`}>
                        <div className="container mx-auto px-6 flex justify-between items-center">
                            <div className="cursor-pointer" onClick={() => window.location.href = 'index.html'}>
                                <div className="font-serif text-2xl tracking-tighter">J<span className="text-gold">.</span>B<span className="text-gold">.</span>K</div>
                            </div>
                            <div className="hidden md:flex items-center space-x-12">
                                <a href="index.html" className="text-[11px] font-bold tracking-[0.2em] uppercase hover:text-gold transition-colors">Accueil</a>
                                <a href="le-cabinet.html" className="text-[11px] font-bold tracking-[0.2em] uppercase hover:text-gold transition-colors">Le Cabinet</a>
                                <a href="droit-minier.html" className="text-[11px] font-bold tracking-[0.2em] uppercase hover:text-gold transition-colors">Droit Minier</a>
                                <Button variant="primary" className="px-6 py-3" onClick={() => window.location.href='index.html#contact'}>Contact</Button>
                            </div>
                        </div>
                    </nav>

                    {/* Hero */}
                    <header class="relative pt-64 pb-32 lux-gradient text-white overflow-hidden bg-charcoal">
                        <div class="absolute inset-0 opacity-20">
                            <img src="images/corporate-boardroom.png" class="object-cover w-full h-full" />
                        </div>
                        <div class="container mx-auto px-6 relative z-10 text-center lg:text-left">
                            <span class="text-gold text-[10px] font-bold tracking-[0.5em] uppercase mb-8 block">Accompagnement Corporate</span>
                            <h1 class="font-serif text-5xl md:text-7xl mb-12 max-w-4xl leading-tight">Pôle Droit des <span class="italic text-gold">Affaires</span></h1>
                            <p class="text-stone-400 text-lg md:text-xl font-light max-w-2xl leading-relaxed italic">"Bâtir des structures solides et juridiquement sécurisées pour soutenir votre croissance."</p>
                        </div>
                    </header>

                    {/* Content */}
                    <main class="py-32">
                        <div class="container mx-auto px-6">
                            <div class="grid lg:grid-cols-3 gap-24">
                                <section class="lg:col-span-2 space-y-16">
                                    <h2 class="font-serif text-3xl mb-10 border-b border-stone-100 pb-6 uppercase tracking-wider text-stone-400 text-xs font-bold underline">Expertise OHADA & Corporate</h2>
                                    <p class="text-stone-700 text-xl font-light mb-12 leading-relaxed">Le cabinet accompagne les entreprises locales et internationales dans leur implantation et leur développement stratégique en République Démocratique du Congo.</p>
                                    
                                    <div class="grid sm:grid-cols-2 gap-10">
                                        {[
                                            { t: "Création de Sociétés", d: "Choix de la forme juridique, rédaction des statuts et formalités au RCCM." },
                                            { t: "Contrats Commerciaux", d: "Rédaction et sécurisation des accords de partenariat, distribution et sous-traitance." },
                                            { t: "Investissement & JV", d: "Conseil en investissement étranger et structuration de joint-ventures complexes." },
                                            { t: "Normes OHADA", d: "Assurer la pleine conformité de vos opérations au droit des affaires harmonisé." },
                                            { t: "Risques Juridiques", d: "Audit, identification et mitigation des risques contractuels et opérationnels." },
                                            { t: "Contentieux Commercial", d: "Assistance et représentation en cas de litiges devant les tribunaux de commerce." }
                                        ].map((item, i) => (
                                            <div key={i} class="group border-l-2 border-stone-100 hover:border-gold pl-8 transition-all duration-500">
                                                <h3 class="font-serif text-xl border-gold mb-3 group-hover:text-gold transition-colors">{item.t}</h3>
                                                <p class="text-stone-500 font-light text-sm leading-relaxed">{item.d}</p>
                                            </div>
                                        ))}
                                    </div>
                                    
                                    <div class="mt-20 p-12 bg-white rounded-3xl border border-stone-100 shadow-sm relative overflow-hidden group">
                                        <div class="absolute top-0 right-0 w-32 h-32 bg-gold/5 rounded-full -translate-y-1/2 translate-x-1/2 group-hover:scale-150 transition-transform duration-700"></div>
                                        <h3 class="font-serif text-2xl mb-6 italic">Objectif</h3>
                                        <p class="text-stone-600 font-light italic leading-relaxed">"Nous ne nous contentons pas de rédiger des actes ; nous bâtissons les piliers juridiques qui soutiennent vos ambitions commerciales les plus élevées."</p>
                                    </div>
                                </section>

                                <aside class="space-y-12">
                                    <div class="bg-ivory border-2 border-gold/20 p-12 rounded-3xl">
                                        <h3 class="font-serif text-2xl mb-8">Pourquoi nous ?</h3>
                                        <div class="space-y-6">
                                            {[
                                                "Maîtrise du cadre OHADA",
                                                "Rapidité d'exécution",
                                                "Approche orientée business",
                                                "Réseau d'institutions locales"
                                            ].map(t => (
                                                <div key={t} class="flex items-center space-x-3">
                                                    <span class="text-gold">✓</span>
                                                    <span class="text-xs font-bold uppercase tracking-widest text-stone-600">{t}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <Button variant="primary" className="w-full" onClick={() => window.location.href='index.html#contact'}>Développement stratégique</Button>
                                </aside>
                            </div>
                        </div>
                    </main>

                    <footer class="bg-charcoal py-20 text-stone-500">
                        <div class="container mx-auto px-6 text-center">
                            <div class="font-serif text-2xl tracking-tighter text-stone-300 mb-8">J<span class="text-gold">.</span>B<span class="text-gold">.</span>K</div>
                            <p class="text-[10px] font-bold tracking-[0.3em] uppercase">Cabinet Maître Jean Bilele Kasongo</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
