<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabinet Jean Bilele Kasongo | Droit Minier & Droit des Affaires en RDC</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel pour le JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <!-- Configuration Tailwind personnalisée -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        'ivory': '#FDFBF7',
                        'charcoal': '#121212',
                        'gold': '#C5A059',
                        'gold-dark': '#A38047',
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
                        'pulse-slow': 'pulse 12s infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(40px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                    },
                }
            }
        }
    </script>

    <style>
        html { scroll-behavior: smooth; }
        body { background-color: #FDFBF7; color: #121212; -webkit-font-smoothing: antialiased; }
        .lux-gradient { background: linear-gradient(135deg, #121212 0%, #1a1a1a 100%); }
        .gold-underline { position: relative; }
        .gold-underline::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 40px; height: 1px; background: #C5A059; transition: width 0.3s; }
        .gold-underline:hover::after { width: 100%; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Icons
        const MiningIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v20"/><path d="M4.93 4.93l14.14 14.14"/><path d="M19.07 4.93L4.93 19.07"/></svg>
        );
        const BusinessIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        );
        const ChevronDown = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        );

        const RevealOnScroll = ({ children, delay = 0 }) => {
            const [isVisible, setIsVisible] = useState(false);
            const ref = useRef(null);
            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) { setIsVisible(true); observer.unobserve(entry.target); }
                }, { threshold: 0.1 });
                if (ref.current) observer.observe(ref.current);
                return () => { if (ref.current) observer.unobserve(ref.current); };
            }, []);
            return (
                <div ref={ref} className={`transition-all duration-1000 transform ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-12'}`} style={{ transitionDelay: `${delay}ms` }}>
                    {children}
                </div>
            );
        };

        const Button = ({ children, variant = "primary", onClick, className = "" }) => {
            const base = "inline-flex items-center justify-center px-10 py-5 rounded-full text-[10px] sm:text-xs font-bold tracking-[0.2em] uppercase transition-all duration-500 cursor-pointer shadow-lg active:scale-95";
            const variants = {
                primary: "bg-charcoal text-white hover:bg-gold border border-charcoal hover:border-gold",
                gold: "bg-gold text-white hover:bg-gold-dark border border-gold"
            };
            return <button onClick={onClick} className={`${base} ${variants[variant]} ${className}`}>{children}</button>;
        };

        function App() {
            const [scrolled, setScrolled] = useState(false);
            const [menuOpen, setMenuOpen] = useState(false);
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollTo = (id) => {
                const el = document.getElementById(id);
                if (el) { el.scrollIntoView({ behavior: 'smooth' }); setMenuOpen(false); }
            };

            return (
                <div className="font-sans text-charcoal selection:bg-gold selection:text-white overflow-x-hidden">
                    {/* Navigation */}
                    <nav className={`fixed w-full z-50 transition-all duration-700 ${scrolled ? 'bg-white/95 backdrop-blur-xl py-4 shadow-xl' : 'bg-transparent py-8'}`}>
                        <div className="container mx-auto px-6 flex justify-between items-center">
                            <div className="z-50 cursor-pointer" onClick={() => window.scrollTo({top: 0, behavior: 'smooth'})}>
                                <div className="font-serif text-2xl tracking-tighter">J<span className="text-gold">.</span>B<span className="text-gold">.</span>K</div>
                            </div>
                            <div className="hidden md:flex items-center space-x-12">
                                <button onClick={() => window.location.href = 'le-cabinet.html'} className="text-[11px] font-bold tracking-[0.2em] uppercase hover:text-gold transition-colors">Le Cabinet</button>
                                <button onClick={() => scrollTo('domaines')} className="text-[11px] font-bold tracking-[0.2em] uppercase hover:text-gold transition-colors">Domaines</button>
                                <button onClick={() => scrollTo('expertise')} className="text-[11px] font-bold tracking-[0.2em] uppercase hover:text-gold transition-colors">Expertise</button>
                                <button onClick={() => scrollTo('contact')} className="text-[11px] font-bold tracking-[0.2em] uppercase hover:text-gold transition-colors">Contact</button>
                                <Button variant="primary" className="px-6 py-3" onClick={() => scrollTo('contact')}>Rendez-vous</Button>
                            </div>
                            <div className="md:hidden z-50">
                                <button onClick={() => setMenuOpen(!menuOpen)} className="text-charcoal focus:outline-none">
                                    <div className="space-y-1.5">
                                        <span className={`block w-6 h-0.5 bg-current transition-all ${menuOpen ? 'rotate-45 translate-y-2' : ''}`}></span>
                                        <span className={`block w-6 h-0.5 bg-current transition-all ${menuOpen ? 'opacity-0' : ''}`}></span>
                                        <span className={`block w-6 h-0.5 bg-current transition-all ${menuOpen ? '-rotate-45 -translate-y-2' : ''}`}></span>
                                    </div>
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* Mobile Menu */}
                    <div className={`fixed inset-0 z-40 bg-white/98 backdrop-blur-2xl flex flex-col justify-center items-center space-y-12 transition-all duration-1000 ${menuOpen ? 'opacity-100 translate-x-0' : 'opacity-0 translate-x-full pointer-events-none'}`}>
                        {['Le Cabinet', 'Domaines', 'Expertise', 'Contact'].map((item, idx) => (
                            <button key={item} onClick={() => item === 'Le Cabinet' ? window.location.href='le-cabinet.html' : scrollTo(item.toLowerCase())} className={`font-serif text-4xl transform transition-all duration-700 ${menuOpen ? 'translate-y-0 opacity-100' : 'translate-y-10 opacity-0'}`} style={{ transitionDelay: `${idx * 100}ms` }}>{item}</button>
                        ))}
                    </div>

                    {/* Hero Section */}
                    <section id="home" className="relative h-screen flex items-center justify-center overflow-hidden">
                        <div className="absolute inset-0 lux-gradient">
                            <img src="images/lawyer-portrait.png" alt="Cabinet JBK" className="object-cover w-full h-full opacity-40 mix-blend-overlay scale-110 animate-pulse-slow active:scale-100 transition-transform duration-[12s]" />
                            <div className="absolute inset-0 bg-gradient-to-b from-charcoal/30 via-transparent to-charcoal/80"></div>
                        </div>
                        <div className="container mx-auto px-6 relative z-10 text-center">
                            <RevealOnScroll>
                                <span className="inline-block text-gold text-[10px] font-bold tracking-[0.5em] uppercase mb-8 border-b border-gold/40 pb-2">Cabinet Maître Jean Bilele Kasongo</span>
                                <h1 className="font-serif text-4xl md:text-6xl lg:text-8xl text-ivory mb-10 leading-[1.1] max-w-5xl mx-auto">Expert en <span className="italic text-gold opacity-90">Droit Minier</span> <br/>& Droit des Affaires en RDC</h1>
                                <p className="text-stone-300 text-base md:text-lg max-w-3xl mx-auto mb-16 font-light leading-relaxed">Nous accompagnons les entreprises, investisseurs et institutions dans la structuration, la sécurisation et le développement de leurs projets stratégiques en République Démocratique du Congo.</p>
                                <div className="flex flex-col sm:flex-row items-center justify-center space-y-6 sm:space-y-0 sm:space-x-8">
                                    <Button variant="gold" onClick={() => scrollTo('contact')}>Conseil Stratégique</Button>
                                    <Button variant="primary" className="bg-white/5 border-white/20 hover:bg-white/10" onClick={() => scrollTo('domaines')}>Nos Pôles d'Expertise</Button>
                                </div>
                            </RevealOnScroll>
                        </div>
                        <div className="absolute bottom-12 left-1/2 -translate-x-1/2 text-gold/50 animate-bounce cursor-pointer" onClick={() => scrollTo('about')}>
                            <ChevronDown />
                        </div>
                    </section>

                    {/* Signature Section */}
                    <section className="py-20 bg-ivory border-y border-stone-200">
                        <div className="container mx-auto px-6 text-center">
                            <RevealOnScroll>
                                <p className="font-serif text-2xl md:text-3xl lg:text-4xl text-charcoal italic leading-relaxed max-w-4xl mx-auto">
                                    "Dans un environnement complexe, la sécurité juridique n’est pas une option — <span className="text-gold">c’est un avantage stratégique</span>."
                                </p>
                            </RevealOnScroll>
                        </div>
                    </section>

                    {/* About Section */}
                    <section id="about" className="py-32 bg-white">
                        <div className="container mx-auto px-6">
                            <div className="grid lg:grid-cols-2 gap-24 items-center">
                                <RevealOnScroll>
                                    <div className="relative aspect-[4/5] rounded-2xl overflow-hidden shadow-2xl group">
                                        <img src="images/corporate-boardroom.png" alt="Expertise RDC" className="object-cover w-full h-full grayscale hover:grayscale-0 transition-all duration-1000" />
                                        <div className="absolute inset-0 border-[15px] border-white/10 m-6 pointer-events-none"></div>
                                    </div>
                                </RevealOnScroll>
                                <RevealOnScroll delay={200}>
                                    <span className="text-gold text-[10px] font-bold tracking-[0.4em] uppercase mb-6 block">À Propos du Cabinet</span>
                                    <h2 className="font-serif text-4xl md:text-5xl mb-10 leading-tight">Transformer vos enjeux juridiques en <span className="italic border-b-2 border-gold pb-1">leviers de croissance.</span></h2>
                                    <p className="text-stone-600 text-lg mb-8 font-light leading-relaxed">Le Cabinet Maître Jean Bilele Kasongo est spécialisé dans le conseil et l'assistance juridique de haut niveau auprès d’acteurs locaux et internationaux en RDC.</p>
                                    <p className="text-stone-600 text-lg mb-12 font-light leading-relaxed">Fort d’une expertise approfondie des réalités juridiques et économiques congolaises, le cabinet apporte des solutions concrètes, fiables et parfaitement adaptées aux environnements les plus complexes.</p>
                                    <div className="space-y-6 mb-12">
                                        {["Conseil stratégique", "Structuration juridique", "Négociation & sécurisation"].map(item => (
                                            <div key={item} className="flex items-center space-x-4">
                                                <span className="w-2 h-2 bg-gold rounded-full"></span>
                                                <span className="text-xs font-bold uppercase tracking-widest">{item}</span>
                                            </div>
                                        ))}
                                    </div>
                                    <Button variant="primary" onClick={() => window.location.href = 'le-cabinet.html'}>Découvrir notre approche</Button>
                                </RevealOnScroll>
                            </div>
                        </div>
                    </section>

                    {/* Domaines Section */}
                    <section id="domaines" className="py-32 bg-stone-50">
                        <div className="container mx-auto px-6">
                            <div className="text-center mb-24">
                                <span className="text-gold text-[10px] font-bold tracking-[0.4em] uppercase mb-4 block">Secteurs Clés</span>
                                <h2 className="font-serif text-4xl md:text-5xl">Pôles d'Excellence</h2>
                                <div className="w-16 h-[2px] bg-gold mx-auto mt-8 opacity-50"></div>
                            </div>
                            <div className="grid md:grid-cols-2 gap-12">
                                {/* Pôle Minier */}
                                <RevealOnScroll>
                                    <div className="bg-white p-16 rounded-3xl shadow-sm border border-stone-100 hover:shadow-2xl transition-all duration-700 group cursor-pointer h-full flex flex-col" onClick={() => window.location.href='droit-minier.html'}>
                                        <div className="text-gold mb-10 transform group-hover:-translate-y-2 transition-transform duration-500"><MiningIcon /></div>
                                        <h3 className="font-serif text-3xl mb-6">Pôle Droit Minier</h3>
                                        <p className="text-stone-500 mb-10 font-light leading-relaxed">Sécurisation des titres, conformité réglementaire et structuration juridique pour maximiser la rentabilité de vos actifs miniers en RDC.</p>
                                        <ul className="space-y-4 mb-12 flex-grow overflow-hidden text-xs font-semibold tracking-widest text-stone-400 uppercase">
                                            <li className="flex items-center space-x-3"><span className="w-1 h-1 bg-gold"></span><span>Titres & Permis</span></li>
                                            <li className="flex items-center space-x-3"><span className="w-1 h-1 bg-gold"></span><span>Accompagnement Administratif</span></li>
                                            <li className="flex items-center space-x-3"><span className="w-1 h-1 bg-gold"></span><span>Négociation de Contrats</span></li>
                                        </ul>
                                        <div className="pt-8 border-t border-stone-50 group-hover:text-gold transition-colors flex items-center justify-between">
                                            <span className="text-[10px] font-bold tracking-widest uppercase">Détails de l'expertise</span>
                                            <ChevronDown className="rotate-[-90deg] w-4 h-4" />
                                        </div>
                                    </div>
                                </RevealOnScroll>
                                {/* Pôle Affaires */}
                                <RevealOnScroll delay={200}>
                                    <div className="bg-charcoal text-white p-16 rounded-3xl shadow-xl hover:shadow-2xl transition-all duration-700 group cursor-pointer h-full flex flex-col" onClick={() => window.location.href='droit-des-affaires.html'}>
                                        <div className="text-gold mb-10 transform group-hover:-translate-y-2 transition-transform duration-500"><BusinessIcon /></div>
                                        <h3 className="font-serif text-3xl mb-6">Pôle Droit des Affaires</h3>
                                        <p className="text-stone-400 mb-10 font-light leading-relaxed">Bâtir des structures solides et juridiquement sécurisées (OHADA) pour soutenir votre croissance et gérer vos risques commerciaux.</p>
                                        <ul className="space-y-4 mb-12 flex-grow overflow-hidden text-xs font-semibold tracking-widest text-stone-500 uppercase">
                                            <li className="flex items-center space-x-3"><span className="w-1 h-1 bg-gold"></span><span>Sociétés & Structuration</span></li>
                                            <li className="flex items-center space-x-3"><span className="w-1 h-1 bg-gold"></span><span>Investissements & Joint-Ventures</span></li>
                                            <li className="flex items-center space-x-3"><span className="w-1 h-1 bg-gold"></span><span>Gestion du Contentieux</span></li>
                                        </ul>
                                        <div className="pt-8 border-t border-white/5 group-hover:text-gold transition-colors flex items-center justify-between">
                                            <span className="text-[10px] font-bold tracking-widest uppercase">Détails de l'expertise</span>
                                            <ChevronDown className="rotate-[-90deg] w-4 h-4" />
                                        </div>
                                    </div>
                                </RevealOnScroll>
                            </div>
                        </div>
                    </section>

                    {/* Expertise Stratégique */}
                    <section id="expertise" className="py-32 bg-white">
                        <div className="container mx-auto px-6">
                            <div className="grid lg:grid-cols-2 gap-24 items-center">
                                <RevealOnScroll>
                                    <span className="text-gold text-[10px] font-bold tracking-[0.4em] uppercase mb-6 block">Vision Holistique</span>
                                    <h2 className="font-serif text-4xl md:text-5xl mb-10 leading-tight">Une expertise <span className="italic">stratégique</span> de haut niveau.</h2>
                                    <p className="text-stone-600 mb-12 font-light leading-relaxed text-lg">Dans un environnement comme la RDC, notre cabinet se positionne comme un partenaire stratégique indispensable. Nous ne faisons pas que conseiller — nous sécurisons et optimisons vos décisions les plus sensibles.</p>
                                    <div className="grid sm:grid-cols-2 gap-10">
                                        {[
                                            { title: "Projets à capitaux étrangers", desc: "Assistance sur les investissements miniers internationaux." },
                                            { title: "Négociations complexes", desc: "Sécurisation de transactions à forte valeur ajoutée." }
                                        ].map((item, i) => (
                                            <div key={i}>
                                                <h4 className="font-serif text-xl mb-4 text-gold-dark">{item.title}</h4>
                                                <p className="text-sm text-stone-500 leading-relaxed font-light">{item.desc}</p>
                                            </div>
                                        ))}
                                    </div>
                                </RevealOnScroll>
                                <RevealOnScroll delay={200}>
                                    <div className="bg-stone-50 p-12 lg:p-16 rounded-[40px] border border-stone-200">
                                        <h3 className="font-serif text-2xl mb-10">Pourquoi nous choisir ?</h3>
                                        <div className="space-y-8">
                                            {[
                                                "Maîtrise absolue du contexte Légal Congolais",
                                                "Approche orientée vers vos résultats",
                                                "Confidentialité et éthique sans compromis",
                                                "Accompagnement sur-mesure de classe mondiale"
                                            ].map((text, i) => (
                                                <div key={i} className="flex items-start space-x-6">
                                                    <div className="mt-1 w-6 h-6 rounded-full bg-gold/10 flex items-center justify-center flex-shrink-0 text-gold text-[10px] uppercase font-bold">{i+1}</div>
                                                    <p className="text-stone-700 text-sm font-semibold tracking-wide">{text}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </RevealOnScroll>
                            </div>
                        </div>
                    </section>

                    {/* CTA Section */}
                    <section id="contact" className="py-32 lux-gradient text-white overflow-hidden relative">
                        <div className="absolute top-0 right-0 w-1/2 h-full bg-gold/5 blur-[120px] rounded-full translate-x-1/2"></div>
                        <div className="container mx-auto px-6 relative z-10 text-center">
                            <RevealOnScroll>
                                <span className="text-gold text-[10px] font-bold tracking-[0.5em] uppercase mb-10 block">Contact Stratégique</span>
                                <h2 className="font-serif text-4xl md:text-6xl mb-12 leading-tight">Prêt à sécuriser vos <br/><span className="italic text-gold">investissements en RDC ?</span></h2>
                                <p className="text-stone-400 max-w-2xl mx-auto mb-16 font-light text-lg">Contactez le Cabinet Maître Jean Bilele Kasongo pour un accompagnement sécurisé et stratégique local ou international.</p>
                                <div className="grid md:grid-cols-3 gap-12 max-w-4xl mx-auto text-center">
                                    <div className="p-8 border border-white/5 rounded-2xl bg-white/5">
                                        <h4 className="text-xs font-bold uppercase tracking-[0.2em] text-gold mb-4">Bureau</h4>
                                        <p className="text-sm font-light text-stone-300">Avenue Maniema coin Kambove,<br/>Lubumbashi, RDC</p>
                                    </div>
                                    <div className="p-8 border border-white/5 rounded-2xl bg-white/5">
                                        <h4 className="text-xs font-bold uppercase tracking-[0.2em] text-gold mb-4">Téléphone</h4>
                                        <p className="text-sm font-light text-stone-300">+243 99 000 00 00</p>
                                    </div>
                                    <div className="p-8 border border-white/5 rounded-2xl bg-white/5">
                                        <h4 className="text-xs font-bold uppercase tracking-[0.2em] text-gold mb-4">Email</h4>
                                        <p className="text-sm font-light text-stone-300">contact@bilele-kasongo.cd</p>
                                    </div>
                                </div>
                                <div className="mt-20">
                                    <Button variant="gold" className="px-16" onClick={() => window.location.href='mailto:contact@bilele-kasongo.cd'}>Engager une consultation</Button>
                                </div>
                            </RevealOnScroll>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="bg-charcoal py-16 border-t border-white/5">
                        <div className="container mx-auto px-6 flex flex-col md:flex-row justify-between items-center text-stone-500">
                            <div className="font-serif text-2xl tracking-tighter text-stone-400 mb-8 md:mb-0">J<span className="text-gold">.</span>B<span className="text-gold">.</span>K</div>
                            <div className="flex space-x-12 text-[9px] font-bold tracking-[0.3em] uppercase">
                                <a href="le-cabinet.html" className="hover:text-gold transition-colors">Cabinet</a>
                                <a href="droit-minier.html" className="hover:text-gold transition-colors">Droit Minier</a>
                                <a href="droit-des-affaires.html" className="hover:text-gold transition-colors">Affaires</a>
                                <a href="#" className="hover:text-gold transition-colors">Dépôt Légal</a>
                            </div>
                            <div className="mt-8 md:mt-0 text-[10px] font-light">
                                <p>© 2026 Cabinet JBK. Design by <a href="https://marcoilng.netlify.app" target="_blank" className="text-gold opacity-80 hover:opacity-100 transition-opacity">Marco ILUNGA</a></p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
