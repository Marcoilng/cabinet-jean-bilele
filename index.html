<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabinet d'Avocat Jean Bilele Kasongo | Lubumbashi</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel pour le JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

    <!-- Configuration Tailwind personnalisée -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Lato', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        'ivory': '#FAFAFA',
                        'charcoal': '#0A0A0A',
                        'gold': '#D4AF37',
                        'gold-dark': '#B8962E',
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.6s ease-out forwards',
                        'bounce-subtle': 'bounceSubtle 2s infinite',
                        'pulse-slow': 'pulse 10s infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(30px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        bounceSubtle: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-5px)' },
                        },
                    },
                }
            }
        }
    </script>

    <style>
        html { scroll-behavior: smooth; }
        body { background-color: #FDFBF7; color: #333333; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #C5A059; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Icons
        const Scale = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/></svg>
        );
        const Gavel = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m14.5 12.5-8 8a2.119 2.119 0 1 1-3-3l8-8"/><path d="m16 16 6-6"/><path d="m8 8 6-6"/><path d="m9 7 8 8"/><path d="m21 11-8-8"/></svg>
        );
        const Users = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        );
        const FileText = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
        );
        const ChevronRight = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="9 18 15 12 9 6"/></svg>
        );
        const MapPin = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        );
        const Phone = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        );
        const Mail = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        );

        const RevealOnScroll = ({ children, delay = 0 }) => {
            const [isVisible, setIsVisible] = useState(false);
            const ref = useRef(null);
            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) { setIsVisible(true); observer.unobserve(entry.target); }
                }, { threshold: 0.1 });
                if (ref.current) observer.observe(ref.current);
                return () => { if (ref.current) observer.unobserve(ref.current); };
            }, []);
            return (
                <div ref={ref} className={`transition-all duration-1000 transform ${isVisible ? 'opacity-100 translate-y-0 scale-100' : 'opacity-0 translate-y-16 scale-95'}`} style={{ transitionDelay: `${delay}ms` }}>
                    {children}
                </div>
            );
        };

        const SectionTitle = ({ title, subtitle, align = "center" }) => (
            <div className={`mb-16 text-${align}`}>
                <span className="block text-gold text-xs font-bold tracking-[0.2em] uppercase mb-4">{subtitle}</span>
                <h2 className="font-serif text-3xl md:text-4xl text-charcoal leading-tight">{title}</h2>
                <div className={`mt-6 h-[1px] w-16 bg-gold ${align === 'center' ? 'mx-auto' : ''} opacity-60`}></div>
            </div>
        );

        const Button = ({ children, variant = "primary", onClick, className = "" }) => {
            const baseStyle = "inline-flex items-center justify-center px-8 py-4 rounded-full text-xs font-bold tracking-[0.15em] uppercase transition-all duration-500 cursor-pointer hover:scale-105 shadow-md";
            const variants = {
                primary: "bg-charcoal text-white hover:bg-gold border border-charcoal hover:border-gold",
                gold: "bg-gold text-white hover:bg-gold-dark border border-gold"
            };
            return <button onClick={onClick} className={`${baseStyle} ${variants[variant]} ${className}`}>{children}</button>;
        };

        function App() {
            const [scrolled, setScrolled] = useState(false);
            const [menuOpen, setMenuOpen] = useState(false);
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollToSection = (id) => {
                const element = document.getElementById(id);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth' });
                    setMenuOpen(false);
                }
            };

            return (
                <div className="bg-ivory min-h-screen font-sans text-charcoal selection:bg-gold selection:text-white overflow-x-hidden">
                    <nav className={`fixed w-full z-50 transition-all duration-700 ${scrolled ? 'bg-white/95 backdrop-blur-md py-4 shadow-sm' : 'bg-transparent py-8'}`}>
                        <div className="container mx-auto px-6 flex justify-between items-center">
                            <div className="z-50 cursor-pointer" onClick={() => scrollToSection('home')}>
                                <div className="font-serif text-2xl tracking-tighter text-charcoal">J<span className="text-gold">.</span>B<span className="text-gold">.</span>K</div>
                            </div>
                            <div className="hidden md:flex items-center space-x-10">
                                <button onClick={() => scrollToSection('le-cabinet')} className="text-xs font-bold tracking-[0.15em] uppercase hover:text-gold transition-colors">Le Cabinet</button>
                                <button onClick={() => scrollToSection('expertise')} className="text-xs font-bold tracking-[0.15em] uppercase hover:text-gold transition-colors">Expertise</button>
                                <button onClick={() => scrollToSection('honoraires')} className="text-xs font-bold tracking-[0.15em] uppercase hover:text-gold transition-colors">Honoraires</button>
                                <button onClick={() => scrollToSection('contact')} className="text-xs font-bold tracking-[0.15em] uppercase hover:text-gold transition-colors">Contact</button>
                                <Button variant="primary" onClick={() => scrollToSection('contact')}>Rendez-vous</Button>
                            </div>
                            <div className="md:hidden z-50">
                                <button onClick={() => setMenuOpen(!menuOpen)} className="text-charcoal focus:outline-none">
                                    <div className="space-y-2">
                                        <span className={`block w-8 h-0.5 bg-current transition-transform ${menuOpen ? 'rotate-45 translate-y-2.5' : ''}`}></span>
                                        <span className={`block w-8 h-0.5 bg-current transition-opacity ${menuOpen ? 'opacity-0' : ''}`}></span>
                                        <span className={`block w-8 h-0.5 bg-current transition-transform ${menuOpen ? '-rotate-45 -translate-y-2.5' : ''}`}></span>
                                    </div>
                                </button>
                            </div>
                        </div>
                        {/* Mobile Overlay */}
                        <div className={`fixed inset-0 bg-ivory/95 backdrop-blur-xl flex flex-col justify-center items-center space-y-10 transition-all duration-700 ease-in-out ${menuOpen ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}`}>
                            {['Le Cabinet', 'Expertise', 'Honoraires', 'Contact'].map((item, idx) => (
                                <button
                                    key={item}
                                    onClick={() => scrollToSection(item.toLowerCase().replace(' ', '-'))}
                                    className={`font-serif text-4xl text-charcoal transition-all duration-500 transform ${menuOpen ? 'translate-y-0 opacity-100' : 'translate-y-10 opacity-0'}`}
                                    style={{ transitionDelay: `${idx * 100}ms` }}
                                >
                                    {item}
                                </button>
                            ))}
                            <div className="absolute bottom-12 text-gold text-xs font-bold tracking-[0.3em] uppercase">Jean Bilele Kasongo</div>
                        </div>
                    </nav>

                    <section id="home" className="relative h-screen flex items-center justify-center overflow-hidden">
                        <div className="absolute inset-0 bg-charcoal">
                            <img src="images/medium-shot-lawyer-portrait.jpg" alt="Maître Jean Bilele Kasongo" className="object-cover w-full h-full opacity-30 mix-blend-luminosity scale-110 animate-pulse-slow" />
                            <div className="absolute inset-0 bg-gradient-to-t from-charcoal via-charcoal/40 to-transparent"></div>
                        </div>
                        <div className="container mx-auto px-6 relative z-10 text-center">
                            <RevealOnScroll>
                                <span className="inline-block text-gold text-xs font-bold tracking-[0.3em] uppercase mb-6 bg-white/5 py-2 px-6 rounded-full backdrop-blur-sm border border-gold/20">Excellence & Intégrité</span>
                                <h1 className="font-serif text-5xl md:text-7xl lg:text-8xl text-ivory mb-8 leading-[1.1]">Cabinet <br/><span className="italic font-light text-gold text-4xl md:text-6xl lg:text-7xl">Jean Bilele Kasongo</span></h1>
                                <p className="text-stone-400 text-lg md:text-xl max-w-2xl mx-auto mb-12 font-light">Avocat au Barreau de Lubumbashi. <span className="font-serif italic text-gold">Expertise, Rigueur et Excellence</span> au service de votre défense.</p>
                                <div className="flex flex-col md:flex-row items-center justify-center space-y-4 md:space-y-0 md:space-x-6">
                                    <Button variant="gold" onClick={() => scrollToSection('contact')}>Consulter un avocat</Button>
                                    <Button variant="primary" className="bg-white/10 text-white border-white/20 hover:bg-white/20" onClick={() => scrollToSection('expertise')}>Nos expertises</Button>
                                </div>
                            </RevealOnScroll>
                        </div>
                        <div className="absolute bottom-10 left-1/2 -translate-x-1/2 z-10 animate-bounce-subtle">
                            <div className="w-[1px] h-12 bg-gradient-to-b from-gold to-transparent"></div>
                        </div>
                    </section>

                    <section id="le-cabinet" className="py-24 md:py-32">
                        <div className="container mx-auto px-6">
                            <div className="grid md:grid-cols-2 gap-16 items-center">
                                <RevealOnScroll>
                                    <div className="relative aspect-[3/4] rounded-3xl bg-stone-200 overflow-hidden shadow-2xl">
                                        <img src="images/medium-shot-woman-working-as-lawyer.jpg" alt="Le Cabinet" className="object-cover w-full h-full grayscale hover:grayscale-0 transition-all duration-1000" />
                                        <div className="absolute inset-0 border border-gold/30 m-4 pointer-events-none rounded-2xl"></div>
                                    </div>
                                </RevealOnScroll>
                                <RevealOnScroll delay={200}>
                                    <span className="block text-gold text-xs font-bold tracking-[0.2em] uppercase mb-6">Le Cabinet</span>
                                    <h2 className="font-serif text-3xl md:text-4xl mb-8 leading-tight">Expertise, Rigueur <br/>et Excellence.</h2>
                                    <p className="text-stone-600 mb-6 font-light leading-relaxed">Situé au cœur de Lubumbashi, le Cabinet Jean Bilele Kasongo accompagne ses clients dans la résolution de leurs litiges juridiques les plus complexes.</p>
                                    <p className="text-stone-600 mb-10 font-light leading-relaxed">Notre approche repose sur une analyse technique rigoureuse, une réactivité constante et un dévouement total pour préserver vos droits et vos intérêts.</p>
                                    <div className="grid grid-cols-2 gap-8 border-t border-stone-200 pt-8">
                                        <div>
                                            <h4 className="font-serif text-xl mb-2">10+</h4>
                                            <p className="text-xs tracking-widest uppercase text-stone-500">Années d'expérience</p>
                                        </div>
                                        <div>
                                            <h4 className="font-serif text-xl mb-2">500+</h4>
                                            <p className="text-xs tracking-widest uppercase text-stone-500">Dossiers traités</p>
                                        </div>
                                    </div>
                                </RevealOnScroll>
                            </div>
                        </div>
                    </section>

                    <section id="expertise" className="py-24 bg-[#F5F3EF]">
                        <div className="container mx-auto px-6">
                            <SectionTitle title="Domaines d'Intervention" subtitle="Expertise" />
                            <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-8">
                                {[
                                    { title: "Droit des Étrangers", icon: <Users />, desc: "Régularisation, visas et séjour en RDC.", link: "d-etrangers.html" },
                                    { title: "Droit Pénal", icon: <Gavel />, desc: "Défense correctionnelle et criminelle.", link: "d-penal.html" },
                                    { title: "Droit de la Famille", icon: <Scale />, desc: "Divorce, garde et successions.", link: "d-famille.html" },
                                    { title: "Droit Routier", icon: <FileText />, desc: "Vitesse, alcool et contestations PV.", link: "d-routier.html" }
                                ].map((item, idx) => (
                                    <RevealOnScroll key={idx} delay={idx * 100}>
                                        <div className="bg-white p-10 rounded-3xl border border-stone-200 hover:border-gold transition-all shadow-sm hover:shadow-xl group cursor-pointer" onClick={() => window.location.href = item.link}>
                                            <div className="text-gold mb-6 transform group-hover:scale-110 transition-transform">{item.icon}</div>
                                            <h3 className="font-serif text-xl mb-4">{item.title}</h3>
                                            <p className="text-sm text-stone-500 leading-relaxed font-light mb-8">{item.desc}</p>
                                            <span className="inline-flex items-center text-xs font-bold tracking-widest uppercase text-stone-400 group-hover:text-gold transition-colors">Explorer <ChevronRight className="w-4 h-4 ml-2" /></span>
                                        </div>
                                    </RevealOnScroll>
                                ))}
                            </div>
                        </div>
                    </section>

                    <section id="honoraires" className="py-24">
                        <div className="container mx-auto px-6">
                            <div className="grid md:grid-cols-2 gap-16 items-center">
                                <RevealOnScroll>
                                    <SectionTitle title="Transparence des Honoraires" subtitle="Engagement" align="left" />
                                    <p className="text-stone-600 mb-8 font-light">Nous croyons qu'une relation de confiance commence par une clarté totale sur les coûts. Chaque intervention fait l'objet d'une convention préalable.</p>
                                    <ul className="space-y-4 text-stone-600 mb-12">
                                        <li className="flex items-center"><span className="w-1.5 h-1.5 bg-gold rounded-full mr-4"></span> Honoraires au forfait pour les étapes définies</li>
                                        <li className="flex items-center"><span className="w-1.5 h-1.5 bg-gold rounded-full mr-4"></span> Honoraires au temps passé pour le conseil</li>
                                        <li className="flex items-center"><span className="w-1.5 h-1.5 bg-gold rounded-full mr-4"></span> Honoraire de résultat complémentaire</li>
                                    </ul>
                                </RevealOnScroll>
                                <RevealOnScroll delay={200}>
                                    <div className="bg-[#1A1A1A] text-white p-12 rounded-3xl relative">
                                        <h3 className="font-serif text-2xl mb-8">Tarification</h3>
                                        <div className="space-y-6">
                                            <div className="flex justify-between border-b border-white/10 pb-4"><span className="text-stone-400">Consultation Cabinet</span><span className="text-gold font-serif">100 $</span></div>
                                            <div className="flex justify-between border-b border-white/10 pb-4"><span className="text-stone-400">Consultation Téléphone</span><span className="text-gold font-serif">50 $</span></div>
                                            <div className="flex justify-between border-b border-white/10 pb-4"><span className="text-stone-400">Ouverture de dossier</span><span className="text-gold font-serif">150 $</span></div>
                                        </div>
                                        <Button variant="gold" className="w-full mt-10" onClick={() => scrollToSection('contact')}>Demander un devis</Button>
                                    </div>
                                </RevealOnScroll>
                            </div>
                        </div>
                    </section>

                    <section id="contact" className="py-24 bg-charcoal text-white">
                        <div className="container mx-auto px-6">
                            <div className="grid md:grid-cols-2 gap-16">
                                <RevealOnScroll>
                                    <SectionTitle title="Prendre rendez-vous" subtitle="Contact" align="left" />
                                    <div className="space-y-8 mb-12">
                                        <div className="flex items-start"><MapPin className="text-gold mr-6" /><p className="font-light">Avenue Maniema coin Kambove, <br/>Lubumbashi, Haut-Katanga, RDC</p></div>
                                        <div className="flex items-start"><Phone className="text-gold mr-6" /><p className="font-light">+243 99 000 00 00</p></div>
                                        <div className="flex items-start"><Mail className="text-gold mr-6" /><p className="font-light">contact@jeanbilelekasongo.cd</p></div>
                                    </div>
                                    <div className="w-full h-80 rounded-3xl overflow-hidden border border-white/10">
                                        <iframe src="https://maps.google.com/maps?q=Avenue%20Maniema%20coin%20Kambove,%20Lubumbashi&t=&z=15&ie=UTF8&iwloc=&output=embed" width="100%" height="100%" loading="lazy"></iframe>
                                    </div>
                                </RevealOnScroll>
                                <RevealOnScroll delay={200}>
                                    <form className="bg-white p-12 rounded-3xl text-charcoal space-y-8 shadow-2xl">
                                        <div className="grid grid-cols-2 gap-8">
                                            <div><label className="block text-xs font-bold uppercase tracking-widest mb-2">Nom</label><input type="text" className="w-full border-b border-stone-200 pb-2 focus:outline-none focus:border-gold" /></div>
                                            <div><label className="block text-xs font-bold uppercase tracking-widest mb-2">Email</label><input type="email" className="w-full border-b border-stone-200 pb-2 focus:outline-none focus:border-gold" /></div>
                                        </div>
                                        <div><label className="block text-xs font-bold uppercase tracking-widest mb-2">Objet</label><select className="w-full border-b border-stone-200 pb-2 bg-transparent focus:outline-none focus:border-gold"><option>Conseil Juridique</option><option>Droit Pénal</option><option>Droit des Étrangers</option></select></div>
                                        <div><label className="block text-xs font-bold uppercase tracking-widest mb-2">Message</label><textarea rows="4" className="w-full border-b border-stone-200 pb-2 focus:outline-none focus:border-gold resize-none"></textarea></div>
                                        <Button variant="primary" className="w-full">Envoyer le message</Button>
                                    </form>
                                </RevealOnScroll>
                            </div>
                        </div>
                    </section>

                    <footer className="bg-[#0a0a0a] text-stone-600 py-16 border-t border-white/5">
                        <div className="container mx-auto px-6 text-center md:text-left">
                            <div className="flex flex-col md:flex-row justify-between items-center mb-12">
                                <div className="font-serif text-2xl tracking-tighter text-stone-300">J<span className="text-gold">.</span>B<span className="text-gold">.</span>K</div>
                                <div className="flex space-x-8 text-xs font-bold tracking-widest uppercase mt-6 md:mt-0">
                                    <a href="#" className="hover:text-gold transition-colors">Mentions Légales</a>
                                    <a href="#" className="hover:text-gold transition-colors">Confidentialité</a>
                                </div>
                            </div>
                            <div className="pt-8 text-xs font-light border-t border-white/5 flex flex-col md:flex-row justify-between items-center">
                                <p className="opacity-50">Lubumbashi, Haut-Katanga, RDC</p>
                                <p className="opacity-50 mt-4 md:mt-0 italic">Conçu par <a href="https://marcoilng.netlify.app" target="_blank" className="text-gold hover:text-white transition-colors">Marco ILUNGA</a></p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
